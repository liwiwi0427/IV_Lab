<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階點滴資料庫管理員</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --sidebar-width: 340px;
            --admin-primary: #007aff;
            --admin-bg: #f5f5f7;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--admin-bg); display: flex; height: 100vh; margin: 0; overflow: hidden; }

        /* 側邊欄 */
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #d1d1d6; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #1c1c1e; color: white; }
        .item-list { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: #f0f7ff; }
        .list-item.active { background: #e5f1ff; border-left: 5px solid var(--admin-primary); }
        .list-item .brand-name { font-weight: 700; color: #1c1c1e; font-size: 0.95rem; }
        .list-item .sub-name { font-size: 0.8rem; color: #666; margin-top: 3px; }

        /* 主編輯區 */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .edit-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .section-title { font-weight: 700; color: var(--admin-primary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* 表單佈局 */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 3; }
        .half-width { grid-column: span 1.5; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 500; color: #444; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        /* 分類複選區 */
        .category-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .cat-chip { background: #eee; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; }
        .cat-chip.selected { background: var(--admin-primary); color: white; border-color: var(--admin-primary); }
        .add-cat-box { display: flex; gap: 5px; margin-top: 10px; }
        .add-cat-box input { width: 150px; padding: 5px; font-size: 0.8rem; }

        /* 代碼匯出 */
        .export-box { background: #2c2c2e; color: #32d74b; padding: 20px; border-radius: 12px; }
        #outputCode { width: 100%; height: 150px; background: transparent; border: 1px solid #444; color: #32d74b; font-family: monospace; margin-top: 10px; }

        .btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
        .btn-save { background: #34c759; color: white; }
        .btn-add { background: var(--admin-primary); color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>🏥 點滴資料管理</h2>
        </div>
        <div style="padding:10px;"><input type="text" id="listSearch" placeholder="搜尋項目..." oninput="renderSidebar()"></div>
        <div class="item-list" id="sidebarList"></div>
        <div style="padding:20px;"><button class="btn btn-add" style="width:100%" onclick="addNewItem()">➕ 新增點滴種類</button></div>
    </aside>

    <main class="main-content">
        <div id="editorUI" style="display:none;">
            <!-- 名稱資訊 -->
            <div class="edit-card">
                <div class="section-title">🏷️ 名稱與分類設定</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>商品名稱 (Brand Name)</label>
                        <input type="text" id="f_brand" placeholder="如：大塚諾沙林">
                    </div>
                    <div class="form-group">
                        <label>學名 (Generic Name)</label>
                        <input type="text" id="f_generic" placeholder="如：Sodium Chloride">
                    </div>
                    <div class="form-group">
                        <label>縮寫 / 成分名 (Abbr.)</label>
                        <input type="text" id="f_name" placeholder="如：0.9% NS">
                    </div>
                    <div class="form-group full-width">
                        <label>分類標籤 (可複選)</label>
                        <div id="catContainer" class="category-container"></div>
                        <div class="add-cat-box">
                            <input type="text" id="newCatInput" placeholder="新標籤名稱">
                            <button type="button" onclick="addNewCategory()">新增標籤</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 成分詳細區 -->
            <div class="edit-card">
                <div class="section-title">🧪 溶液組成分析</div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>主要成分內容 (每 100ml / 500ml 含量)</label>
                        <textarea id="f_ingredients" rows="2" placeholder="例如：Glucose 50g, Sodium Chloride 4.5g"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>電解質濃度 (mEq/L)</label>
                        <textarea id="f_electrolytes" rows="2" placeholder="例如：Na+: 154, Cl-: 154, K+: 20"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>圖片路徑</label>
                        <input type="text" id="f_image">
                    </div>
                </div>
            </div>

            <!-- 適應症區 -->
            <div class="edit-card">
                <div class="section-title">🩺 臨床用途與禁忌</div>
                <div class="form-group">
                    <label>適應症</label>
                    <textarea id="f_indications" rows="3"></textarea>
                </div>
                <div class="form-group" style="margin-top:15px;">
                    <label>注意事項</label>
                    <textarea id="f_precaution" rows="2"></textarea>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; margin-bottom:40px;">
                <button class="btn" style="background:#ff3b30; color:white;" onclick="deleteItem()">🗑️ 刪除項目</button>
                <button class="btn btn-save" onclick="saveData()">💾 暫存修改內容</button>
            </div>
        </div>

        <div class="export-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0">📦 最終資料匯出</h3>
                <button class="btn btn-add" onclick="exportJS()">產生並複製 data.js 內容</button>
            </div>
            <textarea id="outputCode" readonly></textarea>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        let db = [...IV_DATABASE];
        let currentId = null;
        let masterCategories = ["電解質", "醣類", "綜合", "營養", "高張", "等張", "低張"];
        let selectedCategories = [];

        // 初始化：掃描現有資料獲取所有標籤
        function init() {
            db.forEach(item => {
                if(item.categories) {
                    item.categories.forEach(c => { if(!masterCategories.includes(c)) masterCategories.push(c); });
                }
            });
            renderSidebar();
        }

        function renderSidebar() {
            const term = document.getElementById('listSearch').value.toLowerCase();
            const listDiv = document.getElementById('sidebarList');
            listDiv.innerHTML = '';
            
            db.filter(i => i.brand.toLowerCase().includes(term) || i.name.toLowerCase().includes(term)).forEach(item => {
                const div = document.createElement('div');
                div.className = `list-item ${item.id === currentId ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="brand-name">${item.brand}</div>
                    <div class="sub-name">${item.name} | ${item.generic}</div>
                `;
                div.onclick = () => loadItem(item.id);
                listDiv.appendChild(div);
            });
        }

        function loadItem(id) {
            currentId = id;
            const item = db.find(i => i.id === id);
            document.getElementById('editorUI').style.display = 'block';
            
            const fields = ['brand', 'generic', 'name', 'ingredients', 'electrolytes', 'image', 'indications', 'precaution'];
            fields.forEach(f => document.getElementById('f_' + f).value = item[f] || '');
            
            selectedCategories = item.categories || [];
            renderCategoryChips();
            renderSidebar();
        }

        function renderCategoryChips() {
            const container = document.getElementById('catContainer');
            container.innerHTML = '';
            masterCategories.forEach(cat => {
                const span = document.createElement('span');
                span.className = `cat-chip ${selectedCategories.includes(cat) ? 'selected' : ''}`;
                span.innerText = cat;
                span.onclick = () => toggleCategory(cat);
                container.appendChild(span);
            });
        }

        function toggleCategory(cat) {
            if(selectedCategories.includes(cat)) {
                selectedCategories = selectedCategories.filter(c => c !== cat);
            } else {
                selectedCategories.push(cat);
            }
            renderCategoryChips();
        }

        function addNewCategory() {
            const val = document.getElementById('newCatInput').value.trim();
            if(val && !masterCategories.includes(val)) {
                masterCategories.push(val);
                selectedCategories.push(val);
                document.getElementById('newCatInput').value = '';
                renderCategoryChips();
            }
        }

        function saveData() {
            const idx = db.findIndex(i => i.id === currentId);
            const updated = {
                id: currentId,
                brand: document.getElementById('f_brand').value,
                generic: document.getElementById('f_generic').value,
                name: document.getElementById('f_name').value,
                categories: [...selectedCategories],
                ingredients: document.getElementById('f_ingredients').value,
                electrolytes: document.getElementById('f_electrolytes').value,
                image: document.getElementById('f_image').value,
                indications: document.getElementById('f_indications').value,
                precaution: document.getElementById('f_precaution').value,
            };
            db[idx] = updated;
            alert('暫存成功！');
            renderSidebar();
        }

        function addNewItem() {
            const newId = Date.now();
            db.push({ id: newId, brand: "新商品", name: "縮寫", generic: "學名", categories: [] });
            loadItem(newId);
        }

        function deleteItem() {
            if(confirm('確定刪除？')) {
                db = db.filter(i => i.id !== currentId);
                document.getElementById('editorUI').style.display = 'none';
                renderSidebar();
            }
        }

        function exportJS() {
            const code = `const IV_DATABASE = ${JSON.stringify(db, null, 4)};`;
            const out = document.getElementById('outputCode');
            out.value = code;
            out.select();
            document.execCommand('copy');
            alert('代碼已複製！請貼上到 data.js 並存檔。');
        }

        init();
    </script>
</body>
</html>
